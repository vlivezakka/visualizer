<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星空パーティクルオーバーレイ</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(11, 13, 21, 0.86);
      --panel-line: rgba(255, 255, 255, 0.18);
      --text: #f7f6ff;
      --muted: #b8bac9;
      --control-bg: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif;
      color: var(--text);
    }

    body.preview-bg {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.04) 25%, transparent 25%) 0 0 / 48px 48px,
        linear-gradient(315deg, rgba(255,255,255,0.04) 25%, transparent 25%) 0 0 / 48px 48px,
        #080a12;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(840px, calc(100vw - 32px));
      height: calc(100vh - 32px);
      overflow: hidden;
      z-index: 5;
    }

    .panel__head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .grid {
      display: grid;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .settings-layout {
      display: grid;
      grid-template-columns: minmax(0, 500px) minmax(280px, 328px);
      grid-template-rows: minmax(0, 1fr) max-content;
      gap: 12px;
      align-items: stretch;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .settings-section {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 0;
      padding: 13px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(8, 11, 24, 0.78);
      -webkit-backdrop-filter: blur(18px) saturate(135%);
      backdrop-filter: blur(18px) saturate(135%);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }

    .settings-section--display {
      grid-column: 2;
      grid-row: 2;
      overflow: hidden;
    }

    .settings-section--theme {
      grid-column: 2;
      grid-row: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-color: rgba(142, 170, 255, 0.56) transparent;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .settings-section--effects {
      grid-column: 1;
      grid-row: 1 / span 2;
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      scrollbar-color: rgba(142, 170, 255, 0.56) transparent;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .settings-section--effects::-webkit-scrollbar,
    .settings-section--theme::-webkit-scrollbar,
    .theme-list::-webkit-scrollbar {
      width: 7px;
    }

    .settings-section--effects::-webkit-scrollbar-track,
    .settings-section--theme::-webkit-scrollbar-track,
    .theme-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .settings-section--effects::-webkit-scrollbar-thumb,
    .settings-section--theme::-webkit-scrollbar-thumb,
    .theme-list::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 999px;
      background: rgba(142, 170, 255, 0.5);
      background-clip: padding-box;
    }

    .settings-section > .group {
      padding-top: 0;
      border-top: 0;
    }

    .group {
      display: grid;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.11);
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 18px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0;
    }

    .value {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      background: var(--control-bg);
      color: var(--text);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    button:hover {
      border-color: rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.13);
    }

    button:active {
      transform: translateY(1px);
    }

    button.is-on {
      border-color: rgba(97, 133, 255, 0.74);
      background: linear-gradient(135deg, rgba(76, 119, 255, 0.72), rgba(58, 83, 205, 0.48));
      color: #ffffff;
      box-shadow: 0 0 22px rgba(76, 119, 255, 0.28);
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .palette button {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      min-height: 44px;
      padding: 6px;
      background: rgba(0, 0, 0, 0.2);
      text-align: left;
    }

    .palette-name {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 700;
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      height: 8px;
      overflow: hidden;
      border-radius: 4px;
    }

    .chip {
      min-width: 0;
      background: var(--swatch);
    }

    .colors {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .color-choice {
      display: grid;
      gap: 5px;
      min-width: 0;
      min-height: 54px;
      padding: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      color: rgba(255, 255, 255, 0.72);
      cursor: pointer;
    }

    .color-choice.is-on {
      border-color: rgba(118, 151, 255, 0.82);
      background: rgba(48, 75, 196, 0.32);
      box-shadow: 0 0 18px rgba(76, 119, 255, 0.24);
    }

    .color-choice span {
      overflow: hidden;
      font-size: 10px;
      font-weight: 800;
      text-align: left;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .color-swatch {
      display: block;
      height: 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      background: var(--color);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15), 0 0 14px rgba(156, 194, 255, 0.28);
    }

    .rgb-editor {
      display: grid;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.18);
    }

    .rgb-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 11px;
      font-weight: 800;
    }

    .rgb-editor-head output {
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
    }

    .rgb-row {
      display: grid;
      grid-template-columns: 14px minmax(0, 1fr) 28px;
      gap: 6px;
      align-items: center;
      color: rgba(255, 255, 255, 0.65);
      font-size: 10px;
      line-height: 1;
    }

    .rgb-row em {
      color: var(--channel);
      font-style: normal;
      font-weight: 800;
    }

    .rgb-row output {
      color: rgba(255, 255, 255, 0.8);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .rgb-row input[type="range"] {
      height: 12px;
      min-width: 0;
      accent-color: var(--channel);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #5f85ff;
    }

    .range-row {
      display: grid;
      grid-template-columns: 62px 1fr 34px;
      gap: 7px;
      align-items: center;
      min-height: 24px;
    }

    .range-row span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .toggles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .url-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .url-row input {
      min-width: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.24);
      color: var(--muted);
      font-size: 11px;
    }

    .url-row button {
      width: 100%;
      min-height: 36px;
      font-size: 12px;
      font-weight: 700;
    }

    .obs-clean .panel {
      display: none !important;
    }

    .panel-status {
      display: inline-flex;
      min-width: 0;
      min-height: 28px;
      align-items: center;
      padding: 0 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel-actions {
      display: inline-flex;
      gap: 6px;
    }

    .icon-button {
      width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 7px;
      background: rgba(0, 0, 0, 0.24);
      color: rgba(255, 255, 255, 0.86);
      font-size: 16px;
    }

    .value,
    .range-row span {
      color: rgba(233, 239, 255, 0.66);
    }

    .effect-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .preset-grid button {
      min-height: 34px;
      font-size: 12px;
      font-weight: 700;
    }

    .saved-preset-row {
      display: grid;
      grid-template-columns: 1fr 64px;
      gap: 7px;
    }

    .saved-preset-row + .saved-preset-row {
      margin-top: 7px;
    }

    .saved-preset-row input {
      width: 100%;
      min-width: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.84);
      font: inherit;
      font-size: 11px;
    }

    .saved-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
      margin-bottom: 7px;
    }

    .saved-list:empty::before {
      content: "保存済みなし";
      color: rgba(233, 239, 255, 0.5);
      font-size: 11px;
    }

    .saved-list button {
      min-height: 30px;
      padding: 0 9px;
      font-size: 11px;
    }

    .theme-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      max-height: 180px;
      padding-right: 3px;
      overflow-y: auto;
      scrollbar-color: rgba(142, 170, 255, 0.56) transparent;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }

    .theme-list .theme-card {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      min-height: 54px;
      padding: 7px;
      text-align: left;
    }

    .effect-details[hidden] {
      display: none;
    }

    .effect-detail[hidden] {
      display: none;
    }

    .effect-detail {
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.16);
    }

    .effect-detail + .effect-detail {
      margin-top: 7px;
    }

    .effect-detail summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 34px;
      padding: 0 10px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      list-style: none;
    }

    .effect-detail summary::-webkit-details-marker {
      display: none;
    }

    .effect-detail summary::after {
      content: "+";
      color: rgba(220, 229, 255, 0.72);
      font-size: 17px;
      font-weight: 400;
    }

    .effect-detail[open] summary {
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(72, 100, 230, 0.13);
    }

    .effect-detail[open] summary::after {
      content: "−";
    }

    .detail-fields {
      display: grid;
      gap: 7px;
      padding: 9px 10px 10px;
    }

    .corner-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding-top: 2px;
    }

    .corner-option {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 0 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.14);
      color: rgba(255, 255, 255, 0.78);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    .corner-option input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #5f85ff;
    }

    .seed-row {
      display: grid;
      grid-template-columns: 1fr 88px 30px;
      gap: 7px;
      align-items: center;
      padding-top: 2px;
    }

    .seed-row label {
      color: rgba(233, 239, 255, 0.66);
      font-size: 11px;
      font-weight: 700;
    }

    .seed-row input {
      width: 100%;
      min-width: 0;
      height: 30px;
      padding: 0 7px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      color: rgba(255, 255, 255, 0.82);
      font: inherit;
      font-size: 11px;
    }

    .seed-row button {
      width: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1;
    }

    .switch-card {
      display: flex;
      position: relative;
      overflow: hidden;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
      min-height: 42px;
      padding: 8px 9px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .effect-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .switch-card > *:not(input):not(.effect-preview) {
      position: relative;
      z-index: 1;
    }

    .switch-card:hover {
      border-color: rgba(142, 170, 255, 0.38);
      background: rgba(18, 24, 48, 0.42);
    }

    .switch-card.is-on {
      border-color: rgba(97, 133, 255, 0.78);
      background: linear-gradient(135deg, rgba(50, 82, 218, 0.34), rgba(4, 7, 17, 0.42));
      box-shadow: 0 0 24px rgba(65, 98, 255, 0.22);
    }

    .switch-card.is-on .effect-preview {
      opacity: 1;
    }

    .switch-card input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .switch-text {
      min-width: 0;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .switch-ui {
      position: relative;
      flex: 0 0 auto;
      width: 34px;
      height: 20px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.28);
      transition: background 140ms ease, border-color 140ms ease;
    }

    .switch-ui::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.38);
      transition: transform 140ms ease;
    }

    .switch-card.is-on .switch-ui {
      border-color: rgba(118, 151, 255, 0.8);
      background: linear-gradient(135deg, #4c77ff, #79a2ff);
      box-shadow: 0 0 18px rgba(76, 119, 255, 0.42);
    }

    .switch-card.is-on .switch-ui::after {
      transform: translateX(14px);
    }

    button,
    .url-row input {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.22);
    }

    @media (max-width: 820px) {
      .panel {
        top: 12px;
        left: 12px;
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
        overflow: hidden;
      }

      .effect-grid,
      .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .colors {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .settings-layout {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 0.75fr);
        grid-template-rows: minmax(0, 1fr) max-content;
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .settings-section--display {
        grid-column: 2;
        grid-row: 2;
      }

      .settings-section--theme {
        grid-column: 2;
        grid-row: 1;
        min-height: 0;
        overflow-y: auto;
      }

      .settings-section--effects {
        grid-column: 1;
        grid-row: 1 / span 2;
        min-height: 0;
        max-height: 100%;
        overflow-y: auto;
      }
    }

    @media (max-width: 640px) {
      .settings-layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) minmax(0, 0.85fr) max-content;
      }

      .settings-section--effects {
        grid-column: 1;
        grid-row: 1;
      }

      .settings-section--theme {
        grid-column: 1;
        grid-row: 2;
      }

      .settings-section--display {
        grid-column: 1;
        grid-row: 3;
      }
    }
  </style>
</head>
<body class="preview-bg">
  <canvas id="scene" aria-hidden="true"></canvas>

  <section class="panel" id="panel" aria-label="星空パーティクル設定">
    <div class="grid">
      <div class="settings-layout">
        <section class="settings-section settings-section--effects" aria-label="エフェクト設定">
          <div class="panel__head">
            <span class="panel-status" id="activeSummary">星粉</span>
            <div class="panel-actions">
              <button class="icon-button" id="closeDetailsBtn" type="button" title="詳細をすべて閉じる" aria-label="詳細をすべて閉じる">⌃</button>
            </div>
          </div>
      <div class="group">
        <div class="label">エフェクト <span class="value" id="effectLabel">1 ON</span></div>
        <div class="effect-grid" id="effectGroup">
          <label class="switch-card" data-effect="stardust">
            <canvas class="effect-preview" data-preview="stardust" aria-hidden="true"></canvas>
            <span class="switch-text">星粉</span>
            <input type="checkbox" checked>
            <span class="switch-ui" aria-hidden="true"></span>
          </label>
          <label class="switch-card" data-effect="shooting">
            <canvas class="effect-preview" data-preview="shooting" aria-hidden="true"></canvas>
            <span class="switch-text">流れ星</span>
            <input type="checkbox">
            <span class="switch-ui" aria-hidden="true"></span>
          </label>
          <label class="switch-card" data-effect="starrain">
            <canvas class="effect-preview" data-preview="starrain" aria-hidden="true"></canvas>
            <span class="switch-text">星雨</span>
            <input type="checkbox">
            <span class="switch-ui" aria-hidden="true"></span>
          </label>
          <label class="switch-card" data-effect="glitter">
            <canvas class="effect-preview" data-preview="glitter" aria-hidden="true"></canvas>
            <span class="switch-text">四隅きらめき</span>
            <input type="checkbox">
            <span class="switch-ui" aria-hidden="true"></span>
          </label>
        </div>
      </div>

      <div class="group">
        <div class="label">共通設定 <span class="value" id="presetLabel">カスタム</span></div>
        <div class="preset-grid" id="presetGroup">
          <button type="button" data-preset="subtle">控えめ</button>
          <button type="button" data-preset="normal">普通</button>
          <button type="button" data-preset="flashy">派手</button>
          <button type="button" data-preset="custom">カスタム</button>
        </div>
      </div>

      <div class="group effect-details" id="effectDetails">
        <div class="label">エフェクト詳細 <span class="value">ONのみ表示</span></div>

        <details class="effect-detail" data-detail="stardust">
          <summary>星粉</summary>
          <div class="detail-fields">
            <label class="range-row">
              <span>粒量</span>
              <input id="dustAmountRange" type="range" min="20" max="140" value="76">
              <span id="dustAmountValue">76</span>
            </label>
            <label class="range-row">
              <span>瞬き</span>
              <input id="dustTwinkleRange" type="range" min="0" max="180" value="100">
              <span id="dustTwinkleValue">100</span>
            </label>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: true });
    const activeSummary = document.getElementById("activeSummary");
    const effectLabel = document.getElementById("effectLabel");
    const presetLabel = document.getElementById("presetLabel");
    const paletteLabel = document.getElementById("paletteLabel");
    const urlOutput = document.getElementById("urlOutput");

    const PALETTES = {
      moon: {

      },

    const EFFECT_NAMES = {
      stardust: "星粉",
      shooting: "流れ星",
      starrain: "星雨",

    };
    const COLOR_LABELS = {
      star: "星",
      glow: "光",
      accent: "差し色",
      trail: "尾"
    };

    const EFFECT_KEYS = Object.keys(EFFECT_NAMES);
    const DEFAULT_EFFECTS = {
      stardust: true,
      shooting: false,
      starrain: false,
      glitter: false
    };
    const DEFAULT_GLITTER_CORNERS = {
      tl: true,
      tr: true,
      bl: true,
      br: true
    };
    const SAVED_PRESET_STORAGE_KEY = "vlivezakka-nightsky-particles-presets-v1";
    const SAVED_THEME_STORAGE_KEY = "vlivezakka-nightsky-particles-themes-v1";
    const LEGACY_SAVED_PRESET_STORAGE_KEYS = ["codex-nightsky-particle-presets-v1"];
    const LEGACY_SAVED_THEME_STORAGE_KEYS = ["codex-nightsky-particle-themes-v1"];
    const SAVED_CONFIG_KEYS = [
      "star", "glow", "accent", "trail",
      "speed", "size", "glowAmount",
      "stardustAmount", "stardustTwinkle", "dustSize", "dustSpeed", "dustGlow",
      "shootingFrequency", "shootingLength", "shootingSize", "shootingSpeed", "shootingGlow",
      "rainAmount", "rainAngle", "rainSize", "rainSpeed", "rainGlow",
      "glitterAmount", "glitterSpread", "glitterSize", "glitterSpeed", "glitterGlow", "glitterSeed"
    ];
    const PRESETS = {
      subtle: {
        values: {
          stardustAmount: 46, stardustTwinkle: 62, dustSize: 78, dustSpeed: 56, dustGlow: 62,
          shootingFrequency: 18, shootingLength: 80, shootingSize: 72, shootingSpeed: 62, shootingGlow: 62,
          rainAmount: 20, rainAngle: -16, rainSize: 72, rainSpeed: 58, rainGlow: 58,
          glitterAmount: 34, glitterSpread: 86, glitterSize: 70, glitterSpeed: 54, glitterGlow: 64
        }
      },
      normal: {
        values: {
          stardustAmount: 76, stardustTwinkle: 100, dustSize: 100, dustSpeed: 100, dustGlow: 100,
          shootingFrequency: 46, shootingLength: 100, shootingSize: 100, shootingSpeed: 100, shootingGlow: 100,
          rainAmount: 62, rainAngle: -16, rainSize: 100, rainSpeed: 100, rainGlow: 100,
          glitterAmount: 76, glitterSpread: 100, glitterSize: 100, glitterSpeed: 100, glitterGlow: 100
        }
      },
      flashy: {
        values: {
          stardustAmount: 128, stardustTwinkle: 164, dustSize: 142, dustSpeed: 148, dustGlow: 166,
          shootingFrequency: 116, shootingLength: 168, shootingSize: 150, shootingSpeed: 158, shootingGlow: 172,
          rainAmount: 126, rainAngle: -30, rainSize: 138, rainSpeed: 150, rainGlow: 166,
          glitterAmount: 140, glitterSpread: 148, glitterSize: 142, glitterSpeed: 148, glitterGlow: 170
        }
      }
    };

    const CFG = {
      effects: { ...DEFAULT_EFFECTS },
      activePreset: "custom",
      palette: "moon",
      star: "#fff4c7",
      glow: "#8bc7ff",
      accent: "#d9a7ff",
      trail: "#b9ecff",
      speed: 82,
      size: 96,
      glowAmount: 76,
      stardustAmount: 76,
      stardustTwinkle: 100,
      dustSize: 100,
      dustSpeed: 100,
      dustGlow: 100,
      shootingFrequency: 46,
      shootingLength: 100,
      shootingSize: 100,
      shootingSpeed: 100,
      shootingGlow: 100,
      rainAmount: 76,
      rainAngle: -16,
      rainSize: 100,
      rainSpeed: 100,
      rainGlow: 100,
      glitterAmount: 76,
      glitterSpread: 100,
      glitterSize: 100,
      glitterSpeed: 100,
      glitterGlow: 100,
      glitterCorners: { ...DEFAULT_GLITTER_CORNERS },
      glitterSeed: 314,
      preview: true,
      clean: false
    };

    let W = 0;
    let H = 0;
    let DPR = 1;
    let lastTime = performance.now();
    let stars = [];
    let meteors = [];
    let rainStars = [];
    let cornerGlitters = [];
    let meteorBudget = 0;
    let rainBudget = 0;
    let glitterSequence = 0;
    let savedCustomPresets = [];
    let savedColorThemes = [];
    let selectedSavedPresetName = "";
    let selectedSavedThemeName = "";
    let selectedColorKey = "star";

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function hexToRgb(hex) {
      const value = hex.replace("#", "");
      const normalized = value.length === 3
        ? value.split("").map(ch => ch + ch).join("")
        : value.padEnd(6, "0").slice(0, 6);
      const num = Number.parseInt(normalized, 16);
      return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255
      };
    }

    function rgba(hex, alpha) {
      const c = hexToRgb(hex);
      return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
    }

    function rgbToHex({ r, g, b }) {
      return "#" + [r, g, b]
        .map(value => clamp(Math.round(value), 0, 255).toString(16).padStart(2, "0"))
        .join("");
    }

    function choice(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function applyPalette(key, markCustom = true) {
      const palette = PALETTES[key] || PALETTES.moon;
      CFG.palette = key in PALETTES ? key : "moon";
      CFG.star = palette.star;
      CFG.glow = palette.glow;
      CFG.accent = palette.accent;
      CFG.trail = palette.trail;
      selectedSavedThemeName = "";
      if (markCustom) CFG.activePreset = "custom";
      syncColorInputs();
      updateControls();
    }

    function syncColorInputs() {
      [
        ["star", CFG.star],
        ["glow", CFG.glow],
        ["accent", CFG.accent],
        ["trail", CFG.trail]
      ].forEach(([key, value]) => {
        const swatch = document.querySelector(`[data-color-swatch="${key}"]`);
        if (swatch) swatch.style.setProperty("--color", value);
      });
      document.querySelectorAll("[data-color-key]").forEach(button => {
        button.classList.toggle("is-on", button.dataset.colorKey === selectedColorKey);
      });
      const editor = document.getElementById("rgbEditor");
      if (!editor) return;
      const value = CFG[selectedColorKey];
      const rgb = hexToRgb(value);
      editor.dataset.rgbEditor = selectedColorKey;
      document.getElementById("rgbEditorLabel").textContent = COLOR_LABELS[selectedColorKey];
      document.getElementById("rgbHexValue").textContent = value;
      editor.querySelectorAll("[data-rgb-channel]").forEach(input => {
        const channel = input.dataset.rgbChannel;
        input.value = rgb[channel];
        input.nextElementSibling.textContent = rgb[channel];
      });
    }

    function makeStar() {
      const large = Math.random() > 0.9;
      const densityBoost = CFG.stardustAmount / 100;
      const drift = (CFG.speed / 100);
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: (large ? 1.5 + Math.random() * 1.8 : 0.5 + Math.random() * 1.2) * (CFG.size / 100) * (CFG.dustSize / 100),
        alpha: clamp(0.16 + Math.random() * 0.52 + densityBoost * 0.2, 0.12, 0.92),
        phase: Math.random() * Math.PI * 2,
        twinkle: 0.45 + Math.random() * 1.35,
        vx: (-3 + Math.random() * 6) * drift,
        vy: (3 + Math.random() * 11) * drift,
        color: choice([CFG.star, CFG.star, CFG.glow, CFG.accent]),
        shape: large && Math.random() > 0.35 ? "diamond" : "dot"
      };
    }

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.max(1, Math.floor(W * DPR));
      canvas.height = Math.max(1, Math.floor(H * DPR));
      canvas.style.width = `${W}px`;
      canvas.style.height = `${H}px`;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      rebuildStars();
    }

    function targetStarCount() {
      const area = Math.max(0.55, (W * H) / (1920 * 1080));
      const density = clamp(CFG.stardustAmount, 20, 140);
      return Math.floor((24 + density * 3.05 + (density * density) / 72) * area);
    }

    function rebuildStars() {
      const count = targetStarCount();
      stars = Array.from({ length: count }, makeStar);
    }

    function drawDiamond(target, x, y, radius, color, alpha, glowScale = 1) {
      target.save();
      target.translate(x, y);
      target.rotate(Math.PI / 4);
      target.fillStyle = rgba(color, alpha);
      target.shadowBlur = 4 + (CFG.glowAmount / 10) * glowScale;
      target.shadowColor = rgba(color, 0.3 + glowScale * 0.5);
      target.fillRect(-radius * 0.44, -radius * 0.44, radius * 0.88, radius * 0.88);
      target.restore();
    }

    function drawStarDot(target, star, time) {
      const twinkleStrength = CFG.stardustTwinkle / 100;
      const pulse = 1 - (0.35 * twinkleStrength) + Math.sin(time * star.twinkle + star.phase) * (0.35 * twinkleStrength);
      const alpha = clamp(star.alpha * pulse, 0.08, 1);
      const radius = Math.max(0.4, star.r * (0.82 + pulse * 0.32));
      const glowScale = CFG.dustGlow / 100;
      if (star.shape === "diamond") {
        drawDiamond(target, star.x, star.y, radius * 2.4, star.color, alpha, CFG.dustGlow / 100);
        return;
      }

      const gradientRadius = radius * (2.2 + glowScale * 2);
      const gradient = target.createRadialGradient(star.x, star.y, 0, star.x, star.y, gradientRadius);
      gradient.addColorStop(0, rgba(star.color, alpha));
      gradient.addColorStop(0.36, rgba(star.color, alpha * (0.18 + glowScale * 0.24)));
      gradient.addColorStop(1, rgba(star.color, 0));
      target.fillStyle = gradient;
      target.beginPath();
      target.arc(star.x, star.y, gradientRadius, 0, Math.PI * 2);
      target.fill();
      target.fillStyle = rgba(CFG.star, alpha);
      target.beginPath();
      target.arc(star.x, star.y, radius, 0, Math.PI * 2);
      target.fill();
    }

    function updateStars(dt, time) {
      const active = CFG.effects.stardust;
      if (!active) return;

      const speedScale = (CFG.speed / 100) * (CFG.dustSpeed / 100);
      ctx.globalCompositeOperation = "lighter";
      for (const star of stars) {
        star.x += star.vx * dt * speedScale;
        star.y += star.vy * dt * speedScale;
        if (star.y > H + 20) {
          star.x = Math.random() * W;
          star.y = -8 - Math.random() * H * 0.15;
        }
        if (star.x < -20) star.x = W + 20;
        if (star.x > W + 20) star.x = -20;
        drawStarDot(ctx, star, time);
      }
      ctx.globalCompositeOperation = "source-over";
    }

    function spawnMeteor() {
      const fromRight = Math.random() > 0.28;
      const effectSize = CFG.shootingSize / 100;
      const length = (170 + Math.random() * 250) * (CFG.size / 100) * (CFG.shootingLength / 100) * effectSize;
      const speed = (520 + Math.random() * 560) * (0.55 + CFG.speed / 130) * (CFG.shootingSpeed / 100);
      meteors.push({
        x: fromRight ? W + 120 + Math.random() * 220 : Math.random() * W * 0.8,
        y: -80 + Math.random() * H * 0.52,
        vx: -speed * (0.78 + Math.random() * 0.22),
        vy: speed * (0.34 + Math.random() * 0.18),
        length,
        life: 0,
        maxLife: 1.05 + Math.random() * 0.8,
        width: (1.1 + Math.random() * 1.6) * (CFG.size / 100) * effectSize
      });
    }

    function drawMeteor(target, meteor) {
      const t = meteor.life / meteor.maxLife;
      const alpha = Math.sin(Math.PI * clamp(t, 0, 1));
      const glowScale = CFG.shootingGlow / 100;
      const len = meteor.length;
      const angle = Math.atan2(meteor.vy, meteor.vx);
      const tailX = meteor.x - Math.cos(angle) * len;
      const tailY = meteor.y - Math.sin(angle) * len;
      const line = target.createLinearGradient(tailX, tailY, meteor.x, meteor.y);
      line.addColorStop(0, rgba(CFG.trail, 0));
      line.addColorStop(0.4, rgba(CFG.trail, alpha * (0.12 + glowScale * 0.22)));
      line.addColorStop(1, rgba(CFG.star, alpha * (0.5 + glowScale * 0.5)));

      target.save();
      target.globalCompositeOperation = "lighter";
      target.lineCap = "round";
      target.lineWidth = meteor.width * 3.6;
      target.strokeStyle = line;
      target.shadowBlur = 10 + CFG.glowAmount * 0.18 * glowScale;
      target.shadowColor = rgba(CFG.trail, alpha * 0.9);
      target.beginPath();
      target.moveTo(tailX, tailY);
      target.lineTo(meteor.x, meteor.y);
      target.stroke();

      target.fillStyle = rgba(CFG.star, alpha);
      target.beginPath();
      target.arc(meteor.x, meteor.y, meteor.width * 2.2, 0, Math.PI * 2);
      target.fill();
      target.restore();
    }

    function updateMeteors(dt) {
      const active = CFG.effects.shooting;
      if (active) {
        const rate = (CFG.shootingFrequency / 100) * (0.22 + W / 3600);
        meteorBudget += rate * dt;
        if (meteorBudget > 1 || Math.random() < rate * dt) {
          spawnMeteor();
          meteorBudget = Math.max(0, meteorBudget - 1);
        }
      }

      meteors = meteors.filter(meteor => {
        meteor.life += dt;
        meteor.x += meteor.vx * dt;
        meteor.y += meteor.vy * dt;
        drawMeteor(ctx, meteor);
        return meteor.life < meteor.maxLife && meteor.x > -meteor.length - 200 && meteor.y < H + 220;
      });
    }

    function spawnCornerGlitter() {
      const availableCorners = Object.entries(CFG.glitterCorners)
        .filter(([, enabled]) => enabled)
        .map(([corner]) => corner);
      if (!availableCorners.length) return false;

      const random = () => {
        const value = Math.sin((CFG.glitterSeed + glitterSequence * 92821) * 12.9898) * 43758.5453;
        glitterSequence += 1;
        return value - Math.floor(value);
      };
      const corner = availableCorners[Math.floor(random() * availableCorners.length)];
      const spread = CFG.glitterSpread / 100;
      const marginX = W * (0.035 + random() * 0.15 * spread);
      const marginY = H * (0.055 + random() * 0.14 * spread);
      const left = corner === "tl" || corner === "bl";
      const top = corner === "tl" || corner === "tr";
      const x = left ? marginX : W - marginX;
      const y = top ? marginY : H - marginY;
      cornerGlitters.push({
        x,
        y,
        vx: (left ? 1 : -1) * (2 + random() * 7) * (CFG.glitterSpeed / 100),
        vy: (top ? 1 : -1) * (1 + random() * 6) * (CFG.glitterSpeed / 100),
        life: 0,
        maxLife: (1.6 + random() * 2.8) / (0.72 + CFG.glitterAmount / 135),
        size: (7 + random() * 16) * (CFG.size / 100) * (CFG.glitterSize / 100),
        color: [CFG.star, CFG.glow, CFG.accent][Math.floor(random() * 3)],
        phase: random() * Math.PI * 2
      });
      return true;
    }

    function drawSparkle(target, x, y, radius, color, alpha, phase, glowScale = 1) {
      target.save();
      target.translate(x, y);
      target.rotate(phase);
      target.globalCompositeOperation = "lighter";
      target.shadowBlur = 10 + CFG.glowAmount * 0.18 * glowScale;
      target.shadowColor = rgba(color, alpha);
      const g = target.createRadialGradient(0, 0, 0, 0, 0, radius * 1.8);
      g.addColorStop(0, rgba(color, alpha));
      g.addColorStop(0.18, rgba(color, alpha * 0.56));
      g.addColorStop(1, rgba(color, 0));
      target.fillStyle = g;
      target.beginPath();
      target.moveTo(0, -radius * 1.8);
      target.lineTo(radius * 0.26, -radius * 0.26);
      target.lineTo(radius * 1.8, 0);
      target.lineTo(radius * 0.26, radius * 0.26);
      target.lineTo(0, radius * 1.8);
      target.lineTo(-radius * 0.26, radius * 0.26);
      target.lineTo(-radius * 1.8, 0);
      target.lineTo(-radius * 0.26, -radius * 0.26);
      target.closePath();
      target.fill();
      target.restore();
    }

    function updateCornerGlitter(dt, time) {
      const active = CFG.effects.glitter;
      if (active) {
        const targetCount = Math.round(2 + CFG.glitterAmount / 11);
        while (cornerGlitters.length < targetCount) {
          if (!spawnCornerGlitter()) break;
        }
      }

      cornerGlitters = cornerGlitters.filter(item => {
        item.life += dt;
        const p = item.life / item.maxLife;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        const fade = Math.sin(Math.PI * clamp(p, 0, 1));
        const alpha = fade * (0.2 + CFG.glitterGlow / 220);
        const bob = Math.sin(time * 1.1 + item.phase) * 3;
        drawSparkle(ctx, item.x, item.y + bob, item.size * 0.34, item.color, alpha, item.phase + time * 0.24, CFG.glitterGlow / 100);
        return item.life < item.maxLife;
      });
    }

    function spawnRainStar() {
      const speed = (46 + Math.random() * 78) * (0.48 + CFG.speed / 185) * (CFG.rainSpeed / 100);
      const angle = (CFG.rainAngle * Math.PI) / 180;
      rainStars.push({
        x: Math.random() * W,
        y: -16 - Math.random() * H * 0.16,
        vx: Math.sin(angle) * speed,
        vy: Math.cos(angle) * speed,
        r: (0.45 + Math.random() * 1.05) * (CFG.size / 100) * (CFG.rainSize / 100),
        life: 0,
        maxLife: 3.4 + Math.random() * 3.4,
        color: choice([CFG.star, CFG.glow, CFG.trail])
      });
    }

    function updateStarRain(dt) {
      if (CFG.effects.starrain) {
        const rate = (CFG.rainAmount / 100) * (6 + W / 620);
        rainBudget += rate * dt;
        while (rainBudget > 1) {
          spawnRainStar();
          rainBudget -= 1;
        }
      }

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      rainStars = rainStars.filter(item => {
        item.life += dt;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        const alpha = Math.sin(Math.PI * clamp(item.life / item.maxLife, 0, 1)) * (0.24 + CFG.rainGlow / 180);
        ctx.strokeStyle = rgba(item.color, alpha * (0.22 + CFG.rainGlow / 190));
        ctx.lineWidth = Math.max(0.6, item.r);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(item.x - item.vx * 0.08, item.y - item.vy * 0.08);
        ctx.lineTo(item.x, item.y);
        ctx.stroke();
        ctx.fillStyle = rgba(item.color, alpha);
        ctx.beginPath();
        ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
        ctx.fill();
        return item.life < item.maxLife && item.y < H + 30;
      });
      ctx.restore();
    }

    const effectPreviewStates = new Map();

    function getEffectPreviewState(canvasElement, key) {
      let state = effectPreviewStates.get(key);
      if (state) return state;
      state = {
        canvas: canvasElement,
        ctx: canvasElement.getContext("2d", { alpha: true }),
        key,
        width: 0,
        height: 0,
        lastTime: performance.now(),
        stars: [],
        meteors: [],
        rain: [],
        glitters: [],
        meteorTimer: 0
      };
      effectPreviewStates.set(key, state);
      return state;
    }

    function resizeEffectPreview(state) {
      const rect = state.canvas.getBoundingClientRect();
      const width = Math.max(1, Math.round(rect.width));
      const height = Math.max(1, Math.round(rect.height));
      if (state.width === width && state.height === height) return;
      state.width = width;
      state.height = height;
      state.canvas.width = width;
      state.canvas.height = height;
      state.stars = [];
      state.meteors = [];
      state.rain = [];
      state.glitters = [];
    }

    function makePreviewStar(state) {
      const densityBoost = CFG.stardustAmount / 100;
      return {
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        r: (0.75 + Math.random() * 1.8) * (CFG.size / 100) * (CFG.dustSize / 100),
        alpha: clamp(0.16 + Math.random() * 0.52 + densityBoost * 0.2, 0.12, 0.92),
        phase: Math.random() * Math.PI * 2,
        twinkle: 0.45 + Math.random() * 1.35,
        vx: (-3 + Math.random() * 6) * (CFG.speed / 100),
        vy: (3 + Math.random() * 11) * (CFG.speed / 100),
        color: choice([CFG.star, CFG.star, CFG.glow, CFG.accent]),
        shape: Math.random() > 0.74 ? "diamond" : "dot"
      };
    }

    function renderStardustPreview(state, dt, time) {
      const count = Math.round(8 + CFG.stardustAmount / 7);
      while (state.stars.length < count) state.stars.push(makePreviewStar(state));
      state.stars.length = count;
      state.ctx.globalCompositeOperation = "lighter";
      state.stars.forEach(star => {
        star.x += star.vx * dt * (CFG.dustSpeed / 100);
        star.y += star.vy * dt * (CFG.dustSpeed / 100);
        if (star.y > state.height + 8) {
          star.x = Math.random() * state.width;
          star.y = -4;
        }
        if (star.x < -8) star.x = state.width + 8;
        if (star.x > state.width + 8) star.x = -8;
        drawStarDot(state.ctx, star, time);
      });
      state.ctx.globalCompositeOperation = "source-over";
    }

    function spawnPreviewMeteor(state) {
      const effectSize = CFG.shootingSize / 100;
      const length = state.width * (0.42 + CFG.shootingLength / 240) * effectSize;
      const speed = state.width * (1.2 + CFG.shootingSpeed / 115);
      state.meteors.push({
        x: state.width * 0.96,
        y: state.height * (0.12 + Math.random() * 0.22),
        vx: -speed * 0.92,
        vy: speed * 0.34,
        length,
        life: 0,
        maxLife: 0.98 + Math.random() * 0.28,
        width: (0.8 + Math.random() * 1.2) * (CFG.size / 100) * effectSize
      });
    }

    function renderShootingPreview(state, dt) {
      if (CFG.shootingFrequency <= 0) {
        state.meteors = [];
        return;
      }
      state.meteorTimer -= dt;
      if (state.meteorTimer <= 0) {
        spawnPreviewMeteor(state);
        state.meteorTimer = Math.max(0.42, 1.25 - CFG.shootingFrequency / 145);
      }
      state.meteors = state.meteors.filter(meteor => {
        meteor.life += dt;
        meteor.x += meteor.vx * dt;
        meteor.y += meteor.vy * dt;
        drawMeteor(state.ctx, meteor);
        return meteor.life < meteor.maxLife && meteor.x > -meteor.length;
      });
    }

    function makePreviewRain(state) {
      const speed = (22 + Math.random() * 44) * (0.48 + CFG.speed / 185) * (CFG.rainSpeed / 100);
      const angle = (CFG.rainAngle * Math.PI) / 180;
      return {
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        vx: Math.sin(angle) * speed,
        vy: Math.cos(angle) * speed,
        r: (0.5 + Math.random() * 0.95) * (CFG.size / 100) * (CFG.rainSize / 100),
        life: Math.random() * 2,
        maxLife: 2.2 + Math.random() * 1.8,
        color: choice([CFG.star, CFG.glow, CFG.trail])
      };
    }

    function renderStarRainPreview(state, dt) {
      if (CFG.rainAmount <= 0) {
        state.rain = [];
        return;
      }
      const count = Math.round(5 + CFG.rainAmount / 9);
      while (state.rain.length < count) state.rain.push(makePreviewRain(state));
      state.rain.length = count;
      const target = state.ctx;
      target.save();
      target.globalCompositeOperation = "lighter";
      state.rain = state.rain.map(item => {
        item.life += dt;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        if (item.life >= item.maxLife || item.y > state.height + 12 || item.x < -12 || item.x > state.width + 12) {
          const fresh = makePreviewRain(state);
          fresh.y = -4;
          return fresh;
        }
        const alpha = Math.sin(Math.PI * clamp(item.life / item.maxLife, 0, 1)) * (0.24 + CFG.rainGlow / 180);
        target.strokeStyle = rgba(item.color, alpha * (0.22 + CFG.rainGlow / 190));
        target.lineWidth = Math.max(0.6, item.r);
        target.lineCap = "round";
        target.beginPath();
        target.moveTo(item.x - item.vx * 0.08, item.y - item.vy * 0.08);
        target.lineTo(item.x, item.y);
        target.stroke();
        target.fillStyle = rgba(item.color, alpha);
        target.beginPath();
        target.arc(item.x, item.y, item.r, 0, Math.PI * 2);
        target.fill();
        return item;
      });
      target.restore();
    }

    function makePreviewGlitter(state) {
      const corners = Object.entries(CFG.glitterCorners).filter(([, enabled]) => enabled).map(([corner]) => corner);
      if (!corners.length) return null;
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.min(state.width, state.height) * (0.08 + Math.random() * 0.28 * (CFG.glitterSpread / 100));
      return {
        x: state.width * 0.54 + Math.cos(angle) * radius,
        y: state.height * 0.54 + Math.sin(angle) * radius * 0.72,
        vx: Math.cos(angle) * (2 + Math.random() * 7) * (CFG.glitterSpeed / 100),
        vy: Math.sin(angle) * (1 + Math.random() * 6) * (CFG.glitterSpeed / 100),
        life: Math.random() * 0.65,
        maxLife: (1.25 + Math.random() * 1.7) / (0.72 + CFG.glitterAmount / 135),
        size: (5 + Math.random() * 10) * (CFG.size / 100) * (CFG.glitterSize / 100),
        color: choice([CFG.star, CFG.glow, CFG.accent]),
        phase: Math.random() * Math.PI * 2
      };
    }

    function renderGlitterPreview(state, dt, time) {
      if (!Object.values(CFG.glitterCorners).some(Boolean)) {
        state.glitters = [];
        return;
      }
      const count = Math.round(5 + CFG.glitterAmount / 9);
      while (state.glitters.length < count) {
        const item = makePreviewGlitter(state);
        if (!item) break;
        state.glitters.push(item);
      }
      state.glitters = state.glitters.map(item => {
        item.life += dt;
        item.x += item.vx * dt;
        item.y += item.vy * dt;
        if (item.life >= item.maxLife) return makePreviewGlitter(state);
        const progress = item.life / item.maxLife;
        const alpha = Math.sin(Math.PI * clamp(progress, 0, 1)) * (0.2 + CFG.glitterGlow / 220);
        const bob = Math.sin(time * 1.1 + item.phase) * 2;
        drawSparkle(state.ctx, item.x, item.y + bob, item.size * 0.34, item.color, alpha, item.phase + time * 0.24, CFG.glitterGlow / 100);
        return item;
      }).filter(Boolean);
    }

    function renderEffectPreviews(now) {
      document.querySelectorAll(".effect-preview").forEach(canvasElement => {
        const key = canvasElement.dataset.preview;
        const state = getEffectPreviewState(canvasElement, key);
        resizeEffectPreview(state);
        const dt = clamp((now - state.lastTime) / 1000, 0, 0.05);
        state.lastTime = now;
        state.ctx.clearRect(0, 0, state.width, state.height);
        if (key === "stardust") renderStardustPreview(state, dt, now / 1000);
        if (key === "shooting") renderShootingPreview(state, dt);
        if (key === "starrain") renderStarRainPreview(state, dt);
        if (key === "glitter") renderGlitterPreview(state, dt, now / 1000);
      });
      requestAnimationFrame(renderEffectPreviews);
    }

    function resetEffectPreview(key) {
      const state = effectPreviewStates.get(key);
      if (!state) return;
      state.stars = [];
      state.meteors = [];
      state.rain = [];
      state.glitters = [];
      state.meteorTimer = 0;
    }

    function frame(now) {
      const dt = clamp((now - lastTime) / 1000, 0, 0.05);
      lastTime = now;
      ctx.clearRect(0, 0, W, H);

      updateStars(dt, now / 1000);
      updateStarRain(dt);
      updateCornerGlitter(dt, now / 1000);
      updateMeteors(dt);

      requestAnimationFrame(frame);
    }

    function activeEffectNames() {
      return EFFECT_KEYS.filter(key => CFG.effects[key]).map(key => EFFECT_NAMES[key]);
    }

    function setOnlyEffect(effect) {
      EFFECT_KEYS.forEach(key => {
        CFG.effects[key] = key === effect;
      });
    }

    function setAllEffects(enabled) {
      EFFECT_KEYS.forEach(key => {
        CFG.effects[key] = enabled;
      });
    }

    function normalizeEffectKey(key) {
      return key;
    }

    function applyEffectParam(params) {
      const fx = params.get("fx");
      if (fx !== null) {
        setAllEffects(false);
        fx.split(",").map(item => normalizeEffectKey(item.trim())).forEach(key => {
          if (key in CFG.effects) CFG.effects[key] = true;
        });
        return;
      }

      const hasEffectSwitches = EFFECT_KEYS.some(key => params.has(key));
      if (hasEffectSwitches) {
        setAllEffects(false);
        EFFECT_KEYS.forEach(key => {
          const normalized = normalizeEffectKey(key);
          if (params.has(key)) CFG.effects[normalized] = params.get(key) === "1";
        });
        return;
      }

      const mode = normalizeEffectKey(params.get("mode"));
      if (mode === "all") {
        setAllEffects(true);
      } else if (mode && mode in CFG.effects) {
        setOnlyEffect(mode);
      }
    }

    function setRangeValue(id, key) {
      const input = document.getElementById(id);
      CFG[key] = Number(input.value);
      document.getElementById(id.replace("Range", "Value")).textContent = input.value;
    }

    function updateControls() {
      syncColorInputs();
      const names = activeEffectNames();
      const summary = names.length ? names.join(" / ") : "なし";
      activeSummary.textContent = summary;
      effectLabel.textContent = names.length + " ON";
      const presetNames = {
        subtle: "控えめ",
        normal: "普通",
        flashy: "派手",
        custom: "カスタム"
      };
      presetLabel.textContent = presetNames[CFG.activePreset] || "カスタム";
      paletteLabel.textContent = selectedSavedThemeName || PALETTES[CFG.palette]?.name || "カスタム";
      document.querySelectorAll("[data-effect]").forEach(control => {
        const key = control.dataset.effect;
        const enabled = Boolean(CFG.effects[key]);
        control.classList.toggle("is-on", enabled);
        const input = control.querySelector("input");
        if (input) input.checked = enabled;
        const detail = document.querySelector(`[data-detail="${key}"]`);
        if (detail) {
          detail.hidden = !enabled;
          if (!enabled) detail.open = false;
        }
      });
      document.getElementById("effectDetails").hidden = names.length === 0;
      document.querySelectorAll("[data-palette]").forEach(btn => {
        btn.classList.toggle("is-on", btn.dataset.palette === CFG.palette);
      });
      document.querySelectorAll("[data-saved-theme]").forEach(btn => {
        btn.classList.toggle("is-on", btn.dataset.savedTheme === selectedSavedThemeName);
      });
      document.getElementById("deleteSavedThemeBtn").disabled = !selectedSavedThemeName;
      document.querySelectorAll("[data-preset]").forEach(btn => {
        btn.classList.toggle("is-on", btn.dataset.preset === CFG.activePreset);
      });
      document.querySelectorAll("[data-corner]").forEach(input => {
        input.checked = Boolean(CFG.glitterCorners[input.dataset.corner]);
      });
      document.getElementById("glitterSeed").value = CFG.glitterSeed;
      document.getElementById("previewBtn").classList.toggle("is-on", CFG.preview);
      document.body.classList.toggle("preview-bg", CFG.preview);
      document.body.classList.toggle("obs-clean", CFG.clean);
      buildUrl();
    }

    function buildUrl() {
      const params = new URLSearchParams();
      const active = EFFECT_KEYS.filter(key => CFG.effects[key]);
      params.set("fx", active.join(","));
      params.set("preset", CFG.activePreset);
      params.set("palette", CFG.palette);
      params.set("star", CFG.star.replace("#", ""));
      params.set("glow", CFG.glow.replace("#", ""));
      params.set("accent", CFG.accent.replace("#", ""));
      params.set("trail", CFG.trail.replace("#", ""));
      params.set("speed", String(CFG.speed));
      params.set("size", String(CFG.size));
      params.set("light", String(CFG.glowAmount));
      params.set("dust", String(CFG.stardustAmount));
      params.set("twinkle", String(CFG.stardustTwinkle));
      params.set("dustSize", String(CFG.dustSize));
      params.set("dustSpeed", String(CFG.dustSpeed));
      params.set("dustGlow", String(CFG.dustGlow));
      params.set("shootFreq", String(CFG.shootingFrequency));
      params.set("shootLen", String(CFG.shootingLength));
      params.set("shootSize", String(CFG.shootingSize));
      params.set("shootSpeed", String(CFG.shootingSpeed));
      params.set("shootGlow", String(CFG.shootingGlow));
      params.set("rain", String(CFG.rainAmount));
      params.set("rainAngle", String(CFG.rainAngle));
      params.set("rainSize", String(CFG.rainSize));
      params.set("rainSpeed", String(CFG.rainSpeed));
      params.set("rainGlow", String(CFG.rainGlow));
      params.set("glitter", String(CFG.glitterAmount));
      params.set("glitterSpread", String(CFG.glitterSpread));
      params.set("glitterSize", String(CFG.glitterSize));
      params.set("glitterSpeed", String(CFG.glitterSpeed));
      params.set("glitterGlow", String(CFG.glitterGlow));
      params.set("glitterCorners", Object.entries(CFG.glitterCorners).filter(([, enabled]) => enabled).map(([key]) => key).join(","));
      params.set("glitterSeed", String(CFG.glitterSeed));
      params.set("preview", "0");
      params.set("ui", "0");
      urlOutput.value = `${location.href.split("?")[0]}?${params.toString()}`;
    }

    function readColorParam(params, key, fallback) {
      const raw = params.get(key);
      if (!raw) return fallback;
      const clean = raw.replace("#", "").trim();
      return /^[0-9a-fA-F]{6}$/.test(clean) ? `#${clean}` : fallback;
    }

    function readNumberParam(params, key, fallback, min, max) {
      const raw = params.get(key);
      if (raw === null || raw.trim() === "") return fallback;
      const value = Number(raw);
      return Number.isFinite(value) ? clamp(value, min, max) : fallback;
    }

    function syncNumericInputs() {
      [
        ["dustAmountRange", "stardustAmount"],
        ["dustTwinkleRange", "stardustTwinkle"],
        ["dustSizeRange", "dustSize"],
        ["dustSpeedRange", "dustSpeed"],
        ["dustGlowRange", "dustGlow"],
        ["shootingFrequencyRange", "shootingFrequency"],
        ["shootingLengthRange", "shootingLength"],
        ["shootingSizeRange", "shootingSize"],
        ["shootingSpeedRange", "shootingSpeed"],
        ["shootingGlowRange", "shootingGlow"],
        ["rainAmountRange", "rainAmount"],
        ["rainAngleRange", "rainAngle"],
        ["rainSizeRange", "rainSize"],
        ["rainSpeedRange", "rainSpeed"],
        ["rainGlowRange", "rainGlow"],
        ["glitterAmountRange", "glitterAmount"],
        ["glitterSpreadRange", "glitterSpread"],
        ["glitterSizeRange", "glitterSize"],
        ["glitterSpeedRange", "glitterSpeed"],
        ["glitterGlowRange", "glitterGlow"]
      ].forEach(([id, key]) => {
        document.getElementById(id).value = CFG[key];
        setRangeValue(id, key);
      });
    }

    function applyParams() {
      const params = new URLSearchParams(location.search);
      const preset = params.get("preset");
      if (preset && PRESETS[preset]) {
        Object.assign(CFG, PRESETS[preset].values);
        CFG.activePreset = preset;
      } else {
        CFG.activePreset = "custom";
      }
      const palette = params.get("palette");
      if (palette && PALETTES[palette]) {
        applyPalette(palette, false);
      }
      applyEffectParam(params);
      CFG.star = readColorParam(params, "star", CFG.star);
      CFG.glow = readColorParam(params, "glow", CFG.glow);
      CFG.accent = readColorParam(params, "accent", CFG.accent);
      CFG.trail = readColorParam(params, "trail", CFG.trail);
      CFG.speed = readNumberParam(params, "speed", CFG.speed, 20, 180);
      CFG.size = readNumberParam(params, "size", CFG.size, 40, 160);
      CFG.glowAmount = readNumberParam(params, "light", CFG.glowAmount, 0, 130);
      CFG.stardustAmount = readNumberParam(
        params,
        "dust",
        readNumberParam(params, "density", CFG.stardustAmount, 20, 140),
        20,
        140
      );
      CFG.stardustTwinkle = readNumberParam(params, "twinkle", CFG.stardustTwinkle, 0, 180);
      CFG.dustSize = readNumberParam(params, "dustSize", CFG.dustSize, 40, 180);
      CFG.dustSpeed = readNumberParam(params, "dustSpeed", CFG.dustSpeed, 20, 180);
      CFG.dustGlow = readNumberParam(params, "dustGlow", CFG.dustGlow, 0, 180);
      CFG.shootingFrequency = readNumberParam(
        params,
        "shootFreq",
        readNumberParam(params, "meteors", CFG.shootingFrequency, 0, 120),
        0,
        120
      );
      CFG.shootingLength = readNumberParam(params, "shootLen", CFG.shootingLength, 50, 180);
      CFG.shootingSize = readNumberParam(params, "shootSize", CFG.shootingSize, 40, 180);
      CFG.shootingSpeed = readNumberParam(params, "shootSpeed", CFG.shootingSpeed, 20, 180);
      CFG.shootingGlow = readNumberParam(params, "shootGlow", CFG.shootingGlow, 0, 180);
      CFG.rainAmount = readNumberParam(params, "rain", CFG.rainAmount, 0, 140);
      CFG.rainAngle = readNumberParam(params, "rainAngle", CFG.rainAngle, -45, 45);
      CFG.rainSize = readNumberParam(params, "rainSize", CFG.rainSize, 40, 180);
      CFG.rainSpeed = readNumberParam(params, "rainSpeed", CFG.rainSpeed, 20, 180);
      CFG.rainGlow = readNumberParam(params, "rainGlow", CFG.rainGlow, 0, 180);
      CFG.glitterAmount = readNumberParam(params, "glitter", CFG.glitterAmount, 0, 140);
      CFG.glitterSpread = readNumberParam(params, "glitterSpread", CFG.glitterSpread, 40, 160);
      CFG.glitterSize = readNumberParam(params, "glitterSize", CFG.glitterSize, 40, 180);
      CFG.glitterSpeed = readNumberParam(params, "glitterSpeed", CFG.glitterSpeed, 20, 180);
      CFG.glitterGlow = readNumberParam(params, "glitterGlow", CFG.glitterGlow, 0, 180);
      CFG.glitterSeed = Math.round(readNumberParam(params, "glitterSeed", CFG.glitterSeed, 0, 9999));
      const corners = params.get("glitterCorners");
      if (corners !== null) {
        CFG.glitterCorners = { tl: false, tr: false, bl: false, br: false };
        corners.split(",").forEach(corner => {
          if (corner in CFG.glitterCorners) CFG.glitterCorners[corner] = true;
        });
      }
      CFG.preview = params.get("preview") === "1" || (!params.has("preview") && CFG.preview);
      CFG.clean = params.get("ui") === "0";

      syncColorInputs();
      syncNumericInputs();
      cornerGlitters = [];
      glitterSequence = 0;
      updateControls();
    }

    function appendThemePreview(button, name, colors) {
      const label = document.createElement("span");
      label.className = "palette-name";
      label.textContent = name;
      const chips = document.createElement("span");
      chips.className = "chips";
      [colors.star, colors.glow, colors.accent, colors.trail].forEach(color => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.style.setProperty("--swatch", color);
        chips.appendChild(chip);
      });
      button.replaceChildren(label, chips);
    }

    function createPaletteButtons() {
      const group = document.getElementById("paletteGroup");
      Object.entries(PALETTES).forEach(([key, palette]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.palette = key;
        appendThemePreview(button, palette.name, palette);
        button.addEventListener("click", () => {
          applyPalette(key);
          rebuildStars();
        });
        group.appendChild(button);
      });
    }

    function resetGlitters() {
      cornerGlitters = [];
      glitterSequence = 0;
    }

    function resetEffectParticles(effect) {
      if (effect === "shooting") {
        meteors = [];
        meteorBudget = 0;
      }
      if (effect === "rain") {
        rainStars = [];
        rainBudget = 0;
      }
      if (effect === "glitter") {
        resetGlitters();
      }
    }

    function applyPreset(name) {
      if (name === "custom") {
        CFG.activePreset = "custom";
        updateControls();
        return;
      }

      const preset = PRESETS[name];
      if (!preset) return;
      Object.assign(CFG, preset.values);
      CFG.activePreset = name;
      resetEffectParticles("shooting");
      resetEffectParticles("rain");
      resetGlitters();
      rebuildStars();
      syncNumericInputs();
      updateControls();
    }

    function resetSettings() {
      CFG.effects = { ...DEFAULT_EFFECTS };
      CFG.activePreset = "custom";
      CFG.palette = "moon";
      CFG.star = "#fff4c7";
      CFG.glow = "#8bc7ff";
      CFG.accent = "#d9a7ff";
      CFG.trail = "#b9ecff";
      CFG.speed = 82;
      CFG.size = 96;
      CFG.glowAmount = 76;
      CFG.stardustAmount = 76;
      CFG.stardustTwinkle = 100;
      CFG.dustSize = 100;
      CFG.dustSpeed = 100;
      CFG.dustGlow = 100;
      CFG.shootingFrequency = 46;
      CFG.shootingLength = 100;
      CFG.shootingSize = 100;
      CFG.shootingSpeed = 100;
      CFG.shootingGlow = 100;
      CFG.rainAmount = 76;
      CFG.rainAngle = -16;
      CFG.rainSize = 100;
      CFG.rainSpeed = 100;
      CFG.rainGlow = 100;
      CFG.glitterAmount = 76;
      CFG.glitterSpread = 100;
      CFG.glitterSize = 100;
      CFG.glitterSpeed = 100;
      CFG.glitterGlow = 100;
      CFG.glitterCorners = { ...DEFAULT_GLITTER_CORNERS };
      CFG.glitterSeed = 314;
      CFG.preview = true;
      CFG.clean = false;
      selectedSavedThemeName = "";

      meteors = [];
      rainStars = [];
      meteorBudget = 0;
      rainBudget = 0;
      resetGlitters();
      syncColorInputs();
      syncNumericInputs();
      rebuildStars();
      updateControls();
    }

    function snapshotSettings() {
      const values = {};
      SAVED_CONFIG_KEYS.forEach(key => {
        values[key] = CFG[key];
      });
      return {
        effects: { ...CFG.effects },
        glitterCorners: { ...CFG.glitterCorners },
        values
      };
    }

    function applySnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== "object") return;
      if (snapshot.effects && typeof snapshot.effects === "object") {
        EFFECT_KEYS.forEach(key => {
          CFG.effects[key] = Boolean(snapshot.effects[key]);
        });
      }
      SAVED_CONFIG_KEYS.forEach(key => {
        if (snapshot.values?.[key] !== undefined) CFG[key] = snapshot.values[key];
      });
      CFG.glitterCorners = { ...DEFAULT_GLITTER_CORNERS, ...(snapshot.glitterCorners || {}) };
      CFG.activePreset = "custom";
      CFG.palette = "custom";
      selectedSavedThemeName = "";
      resetEffectParticles("shooting");
      resetEffectParticles("rain");
      resetGlitters();
      syncColorInputs();
      syncNumericInputs();
      rebuildStars();
      updateControls();
    }

    function parseSavedArray(raw, filterItem) {
      try {
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed.filter(filterItem) : [];
      } catch (_) {
        return [];
      }
    }

    function readStorageValue(key) {
      try {
        return localStorage.getItem(key);
      } catch (_) {
        return null;
      }
    }

    function readSavedArrayWithLegacy(key, legacyKeys, filterItem) {
      const currentRaw = readStorageValue(key);
      if (currentRaw !== null) return parseSavedArray(currentRaw, filterItem);

      for (const legacyKey of legacyKeys) {
        const legacyRaw = readStorageValue(legacyKey);
        if (legacyRaw === null) continue;
        const legacyItems = parseSavedArray(legacyRaw, filterItem);
        if (legacyItems.length) {
          try {
            localStorage.setItem(key, JSON.stringify(legacyItems));
          } catch (_) {}
        }
        return legacyItems;
      }
      return [];
    }

    function readSavedCustomPresets() {
      return readSavedArrayWithLegacy(
        SAVED_PRESET_STORAGE_KEY,
        LEGACY_SAVED_PRESET_STORAGE_KEYS,
        item => item && typeof item.name === "string" && item.data
      );
    }

    function writeSavedCustomPresets() {
      try {
        localStorage.setItem(SAVED_PRESET_STORAGE_KEY, JSON.stringify(savedCustomPresets));
        return true;
      } catch (_) {
        return false;
      }
    }

    function renderSavedPresetOptions(selectedName = selectedSavedPresetName) {
      selectedSavedPresetName = savedCustomPresets.some(item => item.name === selectedName) ? selectedName : "";
      const list = document.getElementById("savedPresetList");
      list.replaceChildren();
      savedCustomPresets.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = item.name;
        button.classList.toggle("is-on", item.name === selectedSavedPresetName);
        button.addEventListener("click", () => {
          selectedSavedPresetName = item.name;
          applySnapshot(item.data);
          renderSavedPresetOptions(item.name);
        });
        list.appendChild(button);
      });
      document.getElementById("deleteSavedPresetBtn").disabled = !selectedSavedPresetName;
    }

    function loadSavedCustomPresets() {
      savedCustomPresets = readSavedCustomPresets();
      renderSavedPresetOptions();
    }

    function snapshotColorTheme() {
      return {
        star: CFG.star,
        glow: CFG.glow,
        accent: CFG.accent,
        trail: CFG.trail
      };
    }

    function applyColorTheme(theme) {
      if (!theme || typeof theme !== "object") return;
      const params = new URLSearchParams(theme);
      CFG.star = readColorParam(params, "star", CFG.star);
      CFG.glow = readColorParam(params, "glow", CFG.glow);
      CFG.accent = readColorParam(params, "accent", CFG.accent);
      CFG.trail = readColorParam(params, "trail", CFG.trail);
      CFG.palette = "custom";
      CFG.activePreset = "custom";
      syncColorInputs();
      rebuildStars();
      updateControls();
    }

    function readSavedColorThemes() {
      return readSavedArrayWithLegacy(
        SAVED_THEME_STORAGE_KEY,
        LEGACY_SAVED_THEME_STORAGE_KEYS,
        item => item && typeof item.name === "string" && item.colors
      );
    }

    function writeSavedColorThemes() {
      try {
        localStorage.setItem(SAVED_THEME_STORAGE_KEY, JSON.stringify(savedColorThemes));
        return true;
      } catch (_) {
        return false;
      }
    }

    function renderSavedThemeOptions(selectedName = selectedSavedThemeName) {
      selectedSavedThemeName = savedColorThemes.some(item => item.name === selectedName) ? selectedName : "";
      const list = document.getElementById("savedThemeList");
      list.replaceChildren();
      savedColorThemes.forEach(item => {
        const button = document.createElement("button");
        button.type = "button";
        button.classList.add("theme-card");
        button.dataset.savedTheme = item.name;
        appendThemePreview(button, item.name, item.colors);
        button.classList.toggle("is-on", item.name === selectedSavedThemeName);
        button.addEventListener("click", () => {
          selectedSavedThemeName = item.name;
          applyColorTheme(item.colors);
          renderSavedThemeOptions(item.name);
        });
        list.appendChild(button);
      });
      document.getElementById("deleteSavedThemeBtn").disabled = !selectedSavedThemeName;
    }

    function normalizeSavedName(value) {
      return Array.from(value.trim()).slice(0, 24).join("");
    }

    function isTextEditingTarget(target) {
      if (!target) return false;
      const tagName = target.tagName;
      return tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT";
    }

    function loadSavedColorThemes() {
      savedColorThemes = readSavedColorThemes();
      renderSavedThemeOptions();
    }

    function wireControls() {
      document.getElementById("effectGroup").addEventListener("change", event => {
        const input = event.target.closest("input[type='checkbox']");
        if (!input) return;
        const control = input.closest("[data-effect]");
        if (!control) return;
        CFG.activePreset = "custom";
        CFG.effects[control.dataset.effect] = input.checked;
        if (control.dataset.effect === "glitter") resetGlitters();
        if (input.checked) {
          const detail = document.querySelector(`[data-detail="${control.dataset.effect}"]`);
          if (detail) detail.open = true;
        }
        updateControls();
      });

      document.getElementById("presetGroup").addEventListener("click", event => {
        const button = event.target.closest("[data-preset]");
        if (!button) return;
        applyPreset(button.dataset.preset);
      });

      document.getElementById("savePresetBtn").addEventListener("click", () => {
        const input = document.getElementById("presetNameInput");
        const name = normalizeSavedName(input.value);
        if (!name) {
          input.focus();
          return;
        }
        const entry = { name, data: snapshotSettings() };
        const existingIndex = savedCustomPresets.findIndex(item => item.name === name);
        if (existingIndex >= 0) savedCustomPresets[existingIndex] = entry;
        else savedCustomPresets.push(entry);
        if (writeSavedCustomPresets()) {
          renderSavedPresetOptions(name);
          input.value = "";
        }
      });

      document.getElementById("deleteSavedPresetBtn").addEventListener("click", () => {
        const name = selectedSavedPresetName;
        if (!name) return;
        savedCustomPresets = savedCustomPresets.filter(item => item.name !== name);
        selectedSavedPresetName = "";
        if (writeSavedCustomPresets()) renderSavedPresetOptions();
      });

      document.getElementById("saveThemeBtn").addEventListener("click", () => {
        const input = document.getElementById("themeNameInput");
        const name = normalizeSavedName(input.value);
        if (!name) {
          input.focus();
          return;
        }
        const entry = { name, colors: snapshotColorTheme() };
        const existingIndex = savedColorThemes.findIndex(item => item.name === name);
        if (existingIndex >= 0) savedColorThemes[existingIndex] = entry;
        else savedColorThemes.push(entry);
        if (writeSavedColorThemes()) {
          selectedSavedThemeName = name;
          CFG.palette = "custom";
          CFG.activePreset = "custom";
          renderSavedThemeOptions(name);
          updateControls();
          input.value = "";
        }
      });

      document.getElementById("deleteSavedThemeBtn").addEventListener("click", () => {
        const name = selectedSavedThemeName;
        if (!name) return;
        savedColorThemes = savedColorThemes.filter(item => item.name !== name);
        selectedSavedThemeName = "";
        if (writeSavedColorThemes()) renderSavedThemeOptions();
      });

      document.getElementById("colorSelectGroup").addEventListener("click", event => {
        const button = event.target.closest("[data-color-key]");
        if (!button) return;
        selectedColorKey = button.dataset.colorKey;
        updateControls();
      });

      document.getElementById("rgbEditor").addEventListener("input", () => {
        const rgb = {};
        document.querySelectorAll("#rgbEditor [data-rgb-channel]").forEach(input => {
          rgb[input.dataset.rgbChannel] = Number(input.value);
          input.nextElementSibling.textContent = input.value;
        });
        CFG.activePreset = "custom";
        CFG[selectedColorKey] = rgbToHex(rgb);
        CFG.palette = "custom";
        selectedSavedThemeName = "";
        rebuildStars();
        updateControls();
      });

      [
        ["dustAmountRange", "stardustAmount", true],
        ["dustTwinkleRange", "stardustTwinkle", false],
        ["dustSizeRange", "dustSize", true],
        ["dustSpeedRange", "dustSpeed", false],
        ["dustGlowRange", "dustGlow", false],
        ["shootingFrequencyRange", "shootingFrequency", false, "shooting"],
        ["shootingLengthRange", "shootingLength", false, "shooting"],
        ["shootingSizeRange", "shootingSize", false, "shooting"],
        ["shootingSpeedRange", "shootingSpeed", false, "shooting"],
        ["shootingGlowRange", "shootingGlow", false, "shooting"],
        ["rainAmountRange", "rainAmount", false, "rain"],
        ["rainAngleRange", "rainAngle", false, "rain"],
        ["rainSizeRange", "rainSize", false, "rain"],
        ["rainSpeedRange", "rainSpeed", false, "rain"],
        ["rainGlowRange", "rainGlow", false, "rain"],
        ["glitterAmountRange", "glitterAmount", false, "glitter"],
        ["glitterSpreadRange", "glitterSpread", false, "glitter"],
        ["glitterSizeRange", "glitterSize", false, "glitter"],
        ["glitterSpeedRange", "glitterSpeed", false, "glitter"],
        ["glitterGlowRange", "glitterGlow", false, "glitter"]
      ].forEach(([id, key, rebuild, resetEffect]) => {
        document.getElementById(id).addEventListener("input", () => {
          CFG.activePreset = "custom";
          setRangeValue(id, key);
          if (rebuild) rebuildStars();
          if (resetEffect) resetEffectParticles(resetEffect);
          if (resetEffect) resetEffectPreview(resetEffect);
          updateControls();
        });
      });

      document.getElementById("glitterCorners").addEventListener("change", event => {
        const input = event.target.closest("[data-corner]");
        if (!input) return;
        CFG.activePreset = "custom";
        CFG.glitterCorners[input.dataset.corner] = input.checked;
        resetGlitters();
        resetEffectPreview("glitter");
        updateControls();
      });

      document.getElementById("glitterSeed").addEventListener("change", event => {
        CFG.activePreset = "custom";
        CFG.glitterSeed = Math.round(clamp(Number(event.target.value) || 0, 0, 9999));
        resetGlitters();
        updateControls();
      });

      document.getElementById("randomizeSeedBtn").addEventListener("click", () => {
        CFG.activePreset = "custom";
        CFG.glitterSeed = Math.floor(Math.random() * 10000);
        resetGlitters();
        updateControls();
      });

      document.getElementById("previewBtn").addEventListener("click", () => {
        CFG.preview = !CFG.preview;
        updateControls();
      });

      document.getElementById("cleanBtn").addEventListener("click", () => {
        try {
          window.history.replaceState(null, "", urlOutput.value);
        } catch (_) {
          // Some embedded browsers reject URL rewrites, but the visual mode can still switch.
        }
        CFG.preview = false;
        CFG.clean = true;
        updateControls();
      });

      document.getElementById("resetBtn").addEventListener("click", resetSettings);

      document.getElementById("closeDetailsBtn").addEventListener("click", () => {
        document.querySelectorAll(".effect-detail").forEach(detail => {
          detail.open = false;
        });
      });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        urlOutput.select();
        try {
          await navigator.clipboard.writeText(urlOutput.value);
        } catch (_) {
          document.execCommand("copy");
        }
      });

      window.addEventListener("keydown", event => {
        if (event.isComposing || event.ctrlKey || event.metaKey || event.altKey || isTextEditingTarget(event.target)) {
          return;
        }
        if (event.key.toLowerCase() === "h") {
          CFG.clean = !CFG.clean;
          updateControls();
        }
      });
    }

    createPaletteButtons();
    wireControls();
    loadSavedCustomPresets();
    loadSavedColorThemes();
    applyParams();
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(frame);
    requestAnimationFrame(renderEffectPreviews);
  </script>
</body>
</html>
