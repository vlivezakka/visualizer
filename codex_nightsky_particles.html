<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>星空パーティクル リダイレクト</title>
  <meta http-equiv="refresh" content="0; url=nightsky_particles.html">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: transparent;
      color: #eef3ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    a {
      color: #a9c4ff;
    }
  </style>
</head>
<body>
  <p>星空パーティクルを開いています。開かない場合は <a id="redirectLink" href="nightsky_particles.html">こちら</a> を押してください。</p>
  <script>
    const target = new URL("nightsky_particles.html", location.href);
    target.search = location.search;
    target.hash = location.hash;
    document.getElementById("redirectLink").href = target.href;
    location.replace(target.href);
  </script>
</body>
</html>
